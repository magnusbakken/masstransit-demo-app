version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: masstransit-demo-postgres
    environment:
      POSTGRES_USER: masstransit
      POSTGRES_PASSWORD: masstransit
      POSTGRES_DB: masstransit_demo
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -d $${POSTGRES_DB} -U $${POSTGRES_USER}"]
      interval: 10s
      timeout: 5s
      retries: 5

  rabbitmq:
    image: rabbitmq:3-management-alpine
    container_name: masstransit-demo-rabbitmq
    environment:
      RABBITMQ_DEFAULT_USER: masstransit
      RABBITMQ_DEFAULT_PASS: masstransit
    ports:
      - "5672:5672"
      - "15672:15672"
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  azurite:
    image: mcr.microsoft.com/azure-storage/azurite:latest
    container_name: masstransit-demo-azurite
    ports:
      - "10000:10000"
      - "10001:10001"
      - "10002:10002"
    volumes:
      - azurite_data:/data
    command: "azurite --blobHost 0.0.0.0 --blobPort 10000 --queueHost 0.0.0.0 --queuePort 10001 --tableHost 0.0.0.0 --tablePort 10002"

  grafana:
    image: grafana/otel-lgtm:0.19.1
    container_name: masstransit-demo-grafana
    ports:
      - "3000:3000"
      - "4317:4317"
      - "4318:4318"
    volumes:
      - grafana_data:/data
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=admin

volumes:
  postgres_data:
  rabbitmq_data:
  azurite_data:
  grafana_data:
